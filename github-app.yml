name: ActionStream
url: https://your-domain.com
hook_attributes:
  url: https://your-domain.com/api/webhooks/github
  active: true
redirect_url: https://your-domain.com/api/auth/callback/github
public: false
default_permissions:
  actions: read
  checks: read
  contents: read
  metadata: read
  pull_requests: read
default_events:
  - workflow_run
  - workflow_job
  - check_run
  - check_suite
